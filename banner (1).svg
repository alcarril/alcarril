<svg width="900" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0; }
      }
      @keyframes glitch-r {
        0%,86%,100% { opacity:0; transform:translate(0,0); clip-path:none; }
        87% { opacity:.7; transform:translate(-4px,1px);  clip-path:inset(10% 0 75% 0); }
        88% { opacity:.5; transform:translate(3px,-1px);  clip-path:inset(60% 0 10% 0); }
        89% { opacity:0; }
        92% { opacity:.5; transform:translate(-2px,2px);  clip-path:inset(40% 0 40% 0); }
        93% { opacity:0; }
      }
      @keyframes glitch-b {
        0%,86%,100% { opacity:0; transform:translate(0,0); clip-path:none; }
        87% { opacity:.6; transform:translate(4px,-1px);  clip-path:inset(60% 0 10% 0); }
        88% { opacity:.4; transform:translate(-3px,1px);  clip-path:inset(10% 0 70% 0); }
        89% { opacity:0; }
        92% { opacity:.4; transform:translate(2px,-2px);  clip-path:inset(40% 0 40% 0); }
        93% { opacity:0; }
      }
      @keyframes pulse-dot {
        0%,100% { opacity:.6; }
        50%     { opacity:1;  }
      }
      @keyframes flicker {
        0%,100% { opacity:1; }
        92%     { opacity:1; }
        93%     { opacity:.85; }
        94%     { opacity:1; }
        97%     { opacity:.9; }
        98%     { opacity:1; }
      }

      .term-font { font-family: 'Courier New', Courier, monospace; }

      /* title bar */
      .titlebar     { fill: #2d2d2d; }
      .titlebar-txt { font-family: 'Helvetica Neue', Arial, sans-serif; font-size:12px; fill:#9e9e9e; }
      .btn-close    { fill:#ff5f57; animation: pulse-dot 3s ease-in-out infinite; }
      .btn-min      { fill:#febc2e; animation: pulse-dot 3s ease-in-out infinite .4s; }
      .btn-max      { fill:#28c840; animation: pulse-dot 3s ease-in-out infinite .8s; }

      /* terminal body */
      .term-bg      { fill:#0d1117; animation: flicker 8s infinite; }

      /* text styles */
      .prompt-user  { font-size:13px; fill:#28c840; }
      .prompt-host  { font-size:13px; fill:#58a6ff; }
      .prompt-path  { font-size:13px; fill:#e6edf3; }
      .prompt-sym   { font-size:13px; fill:#e6edf3; }
      .cmd          { font-size:13px; fill:#e6edf3; }
      .out-label    { font-size:13px; fill:#58a6ff; }
      .out-val      { font-size:13px; fill:#e6edf3; }
      .out-green    { font-size:13px; fill:#3fb950; }
      .out-yellow   { font-size:13px; fill:#d29922; }
      .out-comment  { font-size:13px; fill:#6e7681; }

      .name-base {
        font-family: 'Courier New', Courier, monospace;
        font-size:20px; font-weight:bold;
        fill:#e6edf3; letter-spacing:1px;
      }
      .name-glitch-r {
        font-family: 'Courier New', Courier, monospace;
        font-size:20px; font-weight:bold;
        fill:#ff4757; letter-spacing:1px;
        animation: glitch-r 6s infinite;
      }
      .name-glitch-b {
        font-family: 'Courier New', Courier, monospace;
        font-size:20px; font-weight:bold;
        fill:#58a6ff; letter-spacing:1px;
        animation: glitch-b 6s infinite;
      }

      .cursor { fill:#58a6ff; animation: blink 1s step-end infinite; }

      /* scanlines */
      .scanline { fill:none; stroke:#ffffff; stroke-width:.6; opacity:.025; }
    </style>

    <pattern id="sl" x="0" y="0" width="900" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="900" y2="0" class="scanline"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Window shadow -->
  <rect x="4" y="6" width="896" height="214" rx="8" fill="#000000" opacity="0.4"/>

  <!-- Window frame -->
  <rect x="0" y="0" width="900" height="220" rx="8" fill="#1c1c1e"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="36" rx="8" class="titlebar"/>
  <rect x="0" y="20" width="900" height="16" class="titlebar"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="6" class="btn-close"/>
  <circle cx="42" cy="18" r="6" class="btn-min"/>
  <circle cx="62" cy="18" r="6" class="btn-max"/>

  <!-- Title -->
  <text x="450" y="23" class="titlebar-txt term-font" text-anchor="middle">alcarril@42madrid: ~</text>

  <!-- Terminal body -->
  <rect x="0" y="36" width="900" height="184" fill="#0d1117"/>

  <!-- Scanlines -->
  <rect x="0" y="36" width="900" height="184" fill="url(#sl)"/>

  <!-- ── Line 1: prompt + whoami ── -->
  <text x="20" y="62" class="prompt-user term-font">alcarril</text>
  <text x="84" y="62" class="prompt-sym term-font">@</text>
  <text x="96" y="62" class="prompt-host term-font">42madrid</text>
  <text x="164" y="62" class="prompt-sym term-font">:</text>
  <text x="170" y="62" class="prompt-path term-font">~</text>
  <text x="186" y="62" class="prompt-sym term-font">$</text>
  <text x="200" y="62" class="cmd term-font">cat profile.txt</text>

  <!-- ── Separator ── -->
  <line x1="20" y1="72" x2="880" y2="72" stroke="#21262d" stroke-width="1"/>

  <!-- ── Output block ── -->

  <!-- NAME with glitch -->
  <text x="20" y="94" class="out-label term-font">NAME    </text>
  <text x="110" y="94" class="out-comment term-font">──  </text>
  <text x="150" y="94" class="name-glitch-r">ALEJANDRO CARRILLO MARTÍN-CARO</text>
  <text x="150" y="94" class="name-glitch-b">ALEJANDRO CARRILLO MARTÍN-CARO</text>
  <text x="150" y="94" class="name-base" filter="url(#glow)">ALEJANDRO CARRILLO MARTÍN-CARO</text>

  <!-- ROLE -->
  <text x="20" y="114" class="out-label term-font">ROLE    </text>
  <text x="110" y="114" class="out-comment term-font">──  </text>
  <text x="150" y="114" class="out-green term-font">Backend · DevOps · Infrastructure · Systems · Low-Level</text>

  <!-- SCHOOL -->
  <text x="20" y="134" class="out-label term-font">SCHOOL  </text>
  <text x="110" y="134" class="out-comment term-font">──  </text>
  <text x="150" y="134" class="out-yellow term-font">42 Madrid</text>
  <text x="252" y="134" class="out-comment term-font">  #peer-learning  #no-teachers  #projects-only</text>

  <!-- FOCUS -->
  <text x="20" y="154" class="out-label term-font">FOCUS   </text>
  <text x="110" y="154" class="out-comment term-font">──  </text>
  <text x="150" y="154" class="out-val term-font">Infrastructure · Cybersecurity · AI  </text>
  <text x="490" y="154" class="out-comment term-font">// converging three fields</text>

  <!-- LOCATION -->
  <text x="20" y="174" class="out-label term-font">LOCATION</text>
  <text x="110" y="174" class="out-comment term-font">──  </text>
  <text x="150" y="174" class="out-val term-font">Madrid, Spain</text>

  <!-- ── Line 2: next prompt + cursor ── -->
  <text x="20" y="200" class="prompt-user term-font">alcarril</text>
  <text x="84" y="200" class="prompt-sym term-font">@</text>
  <text x="96" y="200" class="prompt-host term-font">42madrid</text>
  <text x="164" y="200" class="prompt-sym term-font">:</text>
  <text x="170" y="200" class="prompt-path term-font">~</text>
  <text x="186" y="200" class="prompt-sym term-font">$</text>
  <rect x="200" y="187" width="9" height="15" class="cursor" rx="1"/>

</svg>
