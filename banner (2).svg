<svg width="900" height="160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%      { opacity: 0; }
      }
      @keyframes glitch-r {
        0%,90%,100% { opacity:0; transform:translate(0,0); clip-path:none; }
        91% { opacity:.6; transform:translate(-3px,0); clip-path:inset(20% 0 65% 0); }
        92% { opacity:.4; transform:translate(3px,0);  clip-path:inset(55% 0 15% 0); }
        93% { opacity:0; }
      }
      @keyframes glitch-b {
        0%,90%,100% { opacity:0; transform:translate(0,0); clip-path:none; }
        91% { opacity:.5; transform:translate(3px,0);  clip-path:inset(55% 0 15% 0); }
        92% { opacity:.3; transform:translate(-3px,0); clip-path:inset(20% 0 65% 0); }
        93% { opacity:0; }
      }
      .f { font-family: 'Courier New', monospace; }
      .name      { font-size:32px; font-weight:bold; fill:#e6edf3; letter-spacing:2px; }
      .name-r    { font-size:32px; font-weight:bold; fill:#ff4757; letter-spacing:2px; animation:glitch-r 7s infinite; }
      .name-b    { font-size:32px; font-weight:bold; fill:#58a6ff; letter-spacing:2px; animation:glitch-b 7s infinite; }
      .prompt    { font-size:13px; fill:#3fb950; }
      .path      { font-size:13px; fill:#58a6ff; }
      .sym       { font-size:13px; fill:#6e7681; }
      .sub       { font-size:12px; fill:#6e7681; letter-spacing:3px; }
      .cursor    { fill:#58a6ff; animation:blink 1s step-end infinite; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- bg -->
  <rect width="900" height="160" fill="#0d1117"/>

  <!-- top bar -->
  <rect x="0" y="0" width="900" height="1" fill="#21262d"/>

  <!-- title bar -->
  <rect x="0" y="0" width="900" height="32" fill="#161b22"/>
  <circle cx="20" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="16" r="5" fill="#febc2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>
  <text x="450" y="21" class="f sym" font-size="11" text-anchor="middle">bash — alcarril@42madrid: ~</text>

  <!-- bottom border of titlebar -->
  <rect x="0" y="32" width="900" height="1" fill="#21262d"/>

  <!-- prompt line -->
  <text x="40" y="72" class="f prompt">alcarril</text>
  <text x="100" y="72" class="f sym">@42madrid</text>
  <text x="178" y="72" class="f sym">:</text>
  <text x="185" y="72" class="f path">~</text>
  <text x="198" y="72" class="f sym">$</text>

  <!-- name with glitch -->
  <text x="40" y="118" class="f name-r">ALEJANDRO CARRILLO MARTÍN-CARO</text>
  <text x="40" y="118" class="f name-b">ALEJANDRO CARRILLO MARTÍN-CARO</text>
  <text x="40" y="118" class="f name" filter="url(#glow)">ALEJANDRO CARRILLO MARTÍN-CARO</text>

  <!-- subtitle -->
  <text x="41" y="142" class="f sub">BACKEND · DEVOPS · SYSTEMS · LOW-LEVEL</text>

  <!-- cursor after prompt -->
  <rect x="215" y="60" width="8" height="14" class="cursor" rx="1"/>

  <!-- right tag -->
  <text x="860" y="155" class="f sym" font-size="10" text-anchor="end">42madrid</text>
</svg>
